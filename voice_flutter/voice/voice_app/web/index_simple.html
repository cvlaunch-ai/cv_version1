<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice to Text - 100% Free!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .info {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .mic-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        .mic-button {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #ccc;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 60px;
        }

        .mic-button:hover {
            transform: scale(1.05);
        }

        .mic-button.recording {
            border-color: #dc3545;
            background: #ffe6e6;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7);
            }
            50% {
                box-shadow: 0 0 0 20px rgba(220, 53, 69, 0);
            }
        }

        .controls {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-start {
            background: #667eea;
            color: white;
        }

        .btn-start:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-start.recording {
            background: #dc3545;
        }

        .btn-start.recording:hover {
            background: #c82333;
        }

        .output-container {
            margin-top: 30px;
        }

        .output-label {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .output-box {
            background: #f8f9fa;
            border: 2px solid #667eea;
            border-radius: 15px;
            padding: 20px;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 1.1em;
            line-height: 1.6;
            color: #333;
        }

        .output-box.empty {
            color: #999;
            font-style: italic;
        }

        .status {
            text-align: center;
            margin: 15px 0;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        .status.listening {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.ready {
            background: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Voice to Text</h1>
        <div class="subtitle">100% Free - No API Key Needed!</div>
        <div class="info">Real-time speech recognition in your browser</div>

        <div class="mic-container">
            <div class="mic-button" id="micButton" onclick="toggleRecording()">
                🎤
            </div>
        </div>

        <div class="status ready" id="status">
            Ready to start! Click the microphone or the button below.
        </div>

        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="toggleRecording()">
                Start Recording
            </button>
        </div>

        <div class="output-container">
            <div class="output-label">Transcription:</div>
            <div class="output-box empty" id="output">
                Your transcription will appear here in real-time as you speak...
            </div>
        </div>
    </div>

    <script>
        let recognition;
        let isRecording = false;

        // Check if browser supports speech recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';  // Change to 'te-IN' for Telugu, 'hi-IN' for Hindi

            let finalTranscript = '';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }

                const outputBox = document.getElementById('output');
                outputBox.classList.remove('empty');
                outputBox.innerHTML = finalTranscript + '<span style="color: #999;">' + interimTranscript + '</span>';
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                const status = document.getElementById('status');
                status.className = 'status error';
                status.textContent = `Error: ${event.error}. Please try again.`;
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) {
                    // Restart if it stops unexpectedly
                    recognition.start();
                }
            };
        } else {
            document.getElementById('status').className = 'status error';
            document.getElementById('status').textContent = '❌ Speech Recognition not supported in this browser. Please use Chrome, Edge, or Safari.';
            document.getElementById('startBtn').disabled = true;
        }

        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            try {
                recognition.start();
                isRecording = true;
                
                document.getElementById('micButton').classList.add('recording');
                document.getElementById('startBtn').classList.add('recording');
                document.getElementById('startBtn').textContent = 'Stop Recording';
                document.getElementById('status').className = 'status listening';
                document.getElementById('status').textContent = '🎤 Listening... Speak now!';
                
                console.log('Recording started');
            } catch (error) {
                console.error('Error starting recording:', error);
                document.getElementById('status').className = 'status error';
                document.getElementById('status').textContent = 'Error starting recording. Please try again.';
            }
        }

        function stopRecording() {
            if (recognition) {
                recognition.stop();
            }
            isRecording = false;
            
            document.getElementById('micButton').classList.remove('recording');
            document.getElementById('startBtn').classList.remove('recording');
            document.getElementById('startBtn').textContent = 'Start Recording';
            document.getElementById('status').className = 'status ready';
            document.getElementById('status').textContent = 'Recording stopped. Click to start again.';
            
            console.log('Recording stopped');
        }
    </script>
</body>
</html>
