<!DOCTYPE html>
<html>

<head>
    <title>Voice App Loader</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <!-- 
      UPDATED: Added 'microphone *' and 'camera *' to allow attribute.
      This tells Chrome to persist the permission for the iframe content.
    -->
    <iframe src="http://localhost:8080/app.html" allow="microphone *; camera *; display-capture *"></iframe>
</body>

</html>
